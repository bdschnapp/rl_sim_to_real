/**:
  ros__parameters:
    max_vel: 11.1          # max velocity limit [m/s] (~40 km/h urban)

    # constraints param for normal driving
    normal:
      min_acc: -1.0         # min deceleration [m/ss]
      max_acc: 1.0          # max acceleration [m/ss]
      min_jerk: -0.5        # min jerk [m/sss]
      max_jerk: 0.5         # max jerk [m/sss]

    # constraints to be observed
    limit:
      min_acc: -3.0         # min deceleration limit [m/ss]
      max_acc: 2.0          # max acceleration limit [m/ss]
      min_jerk: -1.5        # min jerk limit [m/sss]
      max_jerk: 1.5         # max jerk limit [m/sss]
