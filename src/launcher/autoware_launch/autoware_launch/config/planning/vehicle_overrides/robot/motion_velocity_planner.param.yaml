/**:
  ros__parameters:
    smooth_velocity_before_planning: true

    trajectory_polygon_collision_check:
      decimate_trajectory_step_length: 0.1  # [m] (car default: 2.0)
      goal_extended_trajectory_length: 1.0  # [m] (car default: 6.0)

      consider_current_pose:
        enable_to_consider_current_pose: true
        time_to_convergence: 1.5 #[s]

    pointcloud:
      mask_lat_margin: 1.1  # [m] must be >= obstacle_slow_down.obstacle_filtering.max_lat_margin

    pointcloud_preprocessing:
      filter_by_trajectory_polygon:
        enable_monolithic_crop_box: false
        enable_multi_polygon_filtering: true
        min_trajectory_length: 5.0    # [m] (car default: 30.0)
        braking_distance_scale_factor: 1.5
        lateral_margin: 1.1           # [m] keep preprocessing margin aligned with pointcloud mask
        height_margin: 1.0
      downsample_by_voxel_grid:
        enable_downsample: true
        voxel_size_x: 0.05
        voxel_size_y: 0.05
        voxel_size_z: 100000.0
      euclidean_clustering:
        enable_clustering: true
        cluster_tolerance: 0.2  # [m] (car default: 1.0) — vehicle width ~0.75m
        min_cluster_size: 1
        max_cluster_size: 100000
