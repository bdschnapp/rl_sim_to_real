/**:
  ros__parameters:
    planning_hz: 10.0
    path_length:
      backward: 2.0      # [m] (car default: 5.0)
      forward: 15.0      # [m] (car default: 50.0)
    waypoint:
      connection_gradient_from_centerline: 2.0  # (car default: 10.0)
    turn_signal:
      search_time: 3.0
      search_distance: 10.0  # [m] (car default: 30.0)
      resampling_interval: 0.2  # [m] (car default: 1.0)
      angle_threshold_deg: 15.0
    goal_connection:
      connection_section_length: 2.0  # [m] (car default: 7.5)
      pre_goal_offset: 0.3            # [m] (car default: 1.0)
