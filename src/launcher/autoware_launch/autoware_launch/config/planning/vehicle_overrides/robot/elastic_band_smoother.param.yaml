/**:
  ros__parameters:
    common:
      # output
      output_delta_arc_length: 0.1     # [m] (car default: 0.5) — 0.5m is half the vehicle length
      output_backward_traj_length: 0.5  # [m] (car default: 5.0)
    # elastic band
    elastic_band:
      option:
        enable_warm_start: true
        enable_optimization_validation: false

      common:
        num_points: 150        # (car default: 100) — keep ~15m coverage at 0.1m step
        delta_arc_length: 0.1  # [m] (car default: 1.0)

      clearance:
        num_joint_points: 3

        clearance_for_fix: 0.0
        clearance_for_joint: 0.1
        clearance_for_smooth: 0.1

      weight:
        smooth_weight: 1.0
        lat_error_weight: 0.001

      qp:
        max_iteration: 10000
        eps_abs: 1.0e-7
        eps_rel: 1.0e-7

      validation:
        max_error: 3.0 # [m]
    # nearest search
    ego_nearest_dist_threshold: 1.0  # [m] (car default: 3.0)
    ego_nearest_yaw_threshold: 1.046 # [rad] = 60 [deg]
    # replanning & trimming trajectory param outside algorithm
    replan:
      enable: true
      max_path_shape_around_ego_lat_dist: 0.2   # [m] (car default: 2.0)
      max_path_shape_forward_lon_dist: 15.0     # [m] (car default: 100.0)
      max_path_shape_forward_lat_dist: 0.05     # [m] (car default: 0.2)
      max_ego_moving_dist: 0.5                  # [m] (car default: 5.0)
      max_goal_moving_dist: 2.0                 # [m] (car default: 15.0)
      max_delta_time_sec: 0.0
